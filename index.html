<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Gallery</title>
  <style>
    @font-face {
      font-family: "STREET MARKER";
      src: url("fonts/STREET MARKER.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1c2733;
      --muted: #6b7785;
      --border: #d8dee4;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background-color: #5b2c21;
      background-image: url("sourceimages/background/brickwall_01.jpg");
      background-repeat: repeat-x;
      background-position: top left;
      background-size: auto 100vh;
      color: var(--text);
    }

    .wrap {
      max-width: 100%;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .gallery {
      display: flex;
      flex-wrap: nowrap;
      gap: 0;
      align-items: stretch;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 1;
      min-height: 0;
      padding-bottom: 4px;
      cursor: grab;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery.is-dragging {
      cursor: grabbing;
    }

    .card {
      position: relative;
      flex: 0 0 auto;
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
      height: 100%;
    }

    .card .card-inner {
      position: relative;
      display: block;
      height: 100%;
    }

    .card img {
      --mask-url: url("sourceimages/mask/mask_01.jpg");
      display: block;
      width: auto;
      height: 100%;
      object-fit: contain;
      background: transparent;
      mix-blend-mode: pin-light;
      opacity: 0.75;
      -webkit-mask-image: var(--mask-url);
      mask-image: var(--mask-url);
      -webkit-mask-mode: luminance;
      mask-mode: luminance;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      -webkit-user-drag: none;
      user-select: none;
    }

    .card-date {
      position: absolute;
      left: 0;
      top: 0;
      transform: rotate(var(--date-rotate, 0deg));
      display: inline-block;
      font-family: "STREET MARKER", "Noto Sans TC", sans-serif;
      font-style: italic;
      color: var(--date-color, #fff);
      mix-blend-mode: pin-light;
      opacity: 0.6;
      font-weight: 700;
      letter-spacing: 0.12em;
      pointer-events: none;
      user-select: none;
    }

    .card-date-main {
      display: block;
      white-space: nowrap;
    }

    .card-signature {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      line-height: 1;
      white-space: nowrap;
      text-align: right;
      transform: translateX(26%);
    }

    .card-date-char {
      display: inline-block;
      line-height: 1;
      transform: translateY(var(--char-base-y, 0px));
    }

  </style>
</head>
<body>
  <main class="wrap">
    <section id="gallery" class="gallery" aria-live="polite"></section>
  </main>

  <script>
    const IMAGE_EXT = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg", ".avif"];
    const LOCAL_MANIFEST = "images/images.json";
    const MASK_DIR = "sourceimages/mask";
    const RELOAD_INTERVAL_MS = 1000;
    const SIGN_FIRST = ["Ari", "Jax", "Nova", "Kiro", "Milo", "Zed", "Niko", "Rae", "Luna", "Vex"];
    const SIGN_LAST = ["Lane", "Stone", "Flux", "Ink", "Rift", "Crow", "Drift", "Vale", "Ghost", "Skye"];
    const FALLBACK_MASKS = [
      `${MASK_DIR}/mask_01.jpg`,
      `${MASK_DIR}/mask_02.jpg`,
      `${MASK_DIR}/mask_03.jpg`
    ];
    let lastRenderKey = "";

    function isImageFile(name) {
      const lower = name.toLowerCase();
      return IMAGE_EXT.some(ext => lower.endsWith(ext));
    }

    function pickRandom(items) {
      if (!Array.isArray(items) || items.length === 0) return "";
      return items[Math.floor(Math.random() * items.length)];
    }

    function formatDateLabel(dateValue) {
      const parsed = dateValue ? new Date(dateValue) : new Date();
      const date = Number.isNaN(parsed.getTime()) ? new Date() : parsed;
      const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const mm = monthNames[date.getMonth()];
      const dd = String(date.getDate()).padStart(2, "0");
      const yyyy = String(date.getFullYear());
      return `${mm}${dd}${yyyy}`;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildRandomDateHtml(dateText) {
      return dateText
        .split("")
        .map((char) => {
          const baseY = randomInt(-12, 12);
          return `<span class="card-date-char" style="font-size: 40px; --char-base-y: ${baseY}px;">${char}</span>`;
        })
        .join("");
    }

    function buildRandomSignature() {
      return `${pickRandom(SIGN_FIRST)} ${pickRandom(SIGN_LAST)}`;
    }

    function pickDatePosition() {
      // Avoid the center block (roughly 30%-70% in both axes)
      for (let i = 0; i < 20; i += 1) {
        const x = randomInt(5, 85);
        const y = randomInt(8, 88);
        const inCenterX = x >= 30 && x <= 70;
        const inCenterY = y >= 30 && y <= 70;
        if (!(inCenterX && inCenterY)) {
          return { x, y };
        }
      }
      // Fallback to edges
      return {
        x: randomInt(5, 20),
        y: randomInt(8, 88)
      };
    }

    function keepDateLabelsVisible(gallery) {
      const cards = gallery.querySelectorAll(".card");
      cards.forEach((card) => {
        const inner = card.querySelector(".card-inner");
        if (!(inner instanceof HTMLElement)) return;
        const labels = card.querySelectorAll(".card-date");
        labels.forEach((label) => {
          if (!(label instanceof HTMLElement)) return;
          const leftPercent = parseFloat(label.style.left) || 0;
          const topPercent = parseFloat(label.style.top) || 0;
          const initialLeft = inner.clientWidth * (leftPercent / 100);
          const initialTop = inner.clientHeight * (topPercent / 100);
          const padding = 12;
          const maxLeft = Math.max(0, inner.clientWidth - label.offsetWidth - padding);
          const maxTop = Math.max(0, inner.clientHeight - label.offsetHeight - padding);
          const nextLeft = Math.min(maxLeft, Math.max(padding, initialLeft));
          const nextTop = Math.min(maxTop, Math.max(padding, initialTop));
          label.style.left = `${nextLeft}px`;
          label.style.top = `${nextTop}px`;
        });
      });
    }

    function pickColorFromImage(img) {
      try {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        if (!ctx) return "";
        const size = 24;
        canvas.width = size;
        canvas.height = size;
        ctx.drawImage(img, 0, 0, size, size);

        for (let i = 0; i < 20; i += 1) {
          const x = randomInt(0, size - 1);
          const y = randomInt(0, size - 1);
          const pixel = ctx.getImageData(x, y, 1, 1).data;
          if (pixel[3] > 24) {
            return `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
          }
        }

        const data = ctx.getImageData(0, 0, size, size).data;
        let r = 0;
        let g = 0;
        let b = 0;
        let count = 0;
        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] <= 24) continue;
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          count += 1;
        }
        if (!count) return "";
        return `rgb(${Math.round(r / count)}, ${Math.round(g / count)}, ${Math.round(b / count)})`;
      } catch {
        return "";
      }
    }

    function applyDateColorsFromImages(gallery) {
      const cards = gallery.querySelectorAll(".card");
      cards.forEach((card) => {
        const img = card.querySelector("img");
        if (!(img instanceof HTMLImageElement)) return;
        const labels = card.querySelectorAll(".card-date");
        if (!labels.length) return;

        const setColor = () => {
          const sampledColor = pickColorFromImage(img);
          if (!sampledColor) return;
          labels.forEach((label) => {
            if (label instanceof HTMLElement) label.style.setProperty("--date-color", sampledColor);
          });
        };

        if (img.complete && img.naturalWidth > 0) {
          setColor();
        } else {
          img.addEventListener("load", setColor, { once: true });
        }
      });
    }

    async function loadLocalManifest() {
      const res = await fetch(LOCAL_MANIFEST, { cache: "no-store" });
      if (!res.ok) throw new Error(`Manifest ${res.status}`);
      const raw = await res.text();
      const data = JSON.parse(raw.replace(/^\uFEFF/, ""));
      if (!Array.isArray(data)) throw new Error("Invalid manifest format");
      return data
        .filter(item => item && typeof item.path === "string" && isImageFile(item.path))
        .map(item => ({
          name: item.name || item.path.split("/").pop(),
          path: item.path,
          lastModified: item.lastModified || ""
        }));
    }

    function sortOldToNew(images) {
      return images.sort((a, b) => {
        const ta = a.lastModified || "9999-12-31T23:59:59Z";
        const tb = b.lastModified || "9999-12-31T23:59:59Z";
        if (ta !== tb) return ta.localeCompare(tb);
        return a.name.localeCompare(b.name);
      });
    }

    async function loadFromGitHubApi() {
      const owner = "GeosephLien";
      const repo = "Image_Source";
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/images`;
      const res = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const files = await res.json();
      return files
        .filter(item => item.type === "file" && isImageFile(item.name))
        .map(item => ({
          name: item.name,
          path: `images/${item.name}`,
          lastModified: ""
        }))
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    async function loadMasksFromGitHubApi() {
      const owner = "GeosephLien";
      const repo = "Image_Source";
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/${MASK_DIR}`;
      const res = await fetch(api, {
        cache: "no-store",
        headers: { Accept: "application/vnd.github+json" }
      });
      if (!res.ok) throw new Error(`Mask API ${res.status}`);
      const files = await res.json();
      return files
        .filter(item => item.type === "file" && isImageFile(item.name))
        .map(item => `${MASK_DIR}/${item.name}`)
        .sort((a, b) => a.localeCompare(b));
    }

    function applyCardOverlap(gallery) {
      const cards = gallery.querySelectorAll(".card");
      cards.forEach((card) => {
        card.style.marginLeft = "0";
      });
    }

    async function loadImages() {
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");
      try {
        let masks;
        let maskSource = "GitHub API";
        try {
          masks = await loadMasksFromGitHubApi();
          if (masks.length === 0) throw new Error("No masks found");
        } catch {
          masks = FALLBACK_MASKS;
          maskSource = "fallback";
        }

        let images;
        let source = "images/images.json";
        try {
          images = sortOldToNew(await loadLocalManifest());
        } catch {
          images = await loadFromGitHubApi();
          source = "GitHub API fallback";
        }

        const renderKey = JSON.stringify({
          images: images.map(item => `${item.path}|${item.lastModified || ""}`),
          masks
        });
        if (renderKey === lastRenderKey) return;

        if (images.length === 0) {
          gallery.innerHTML = "";
          lastRenderKey = renderKey;
          if (status) status.textContent = "No images found in images/.";
          return;
        }

        const cards = images.map(item => {
          const url = item.path;
          const maskUrl = pickRandom(masks);
          const dateLabel = formatDateLabel(item.lastModified);
          const datePos = pickDatePosition();
          const dateRotate = randomInt(-20, 20);
          const signature = buildRandomSignature();
          const dateHtml = buildRandomDateHtml(dateLabel);
          return `
            <article class="card">
              <div class="card-inner">
                <img src="${url}" alt="${item.name}" loading="lazy" style="--mask-url: url('${maskUrl}');" />
                <span class="card-date" style="--date-rotate: ${dateRotate}deg; left: ${datePos.x}%; top: ${datePos.y}%;">
                  <span class="card-date-main">${dateHtml}</span>
                  <span class="card-signature">${signature}</span>
                </span>
              </div>
            </article>
          `;
        });

        gallery.innerHTML = cards.join("");
        applyCardOverlap(gallery);
        keepDateLabelsVisible(gallery);
        applyDateColorsFromImages(gallery);
        lastRenderKey = renderKey;
        if (status) status.textContent = `Loaded ${images.length} images (${source}), ${masks.length} masks (${maskSource})`;
      } catch (err) {
        if (status) status.textContent = `Load failed: ${err.message}`;
      }
    }

    function setupAutoFillBehavior() {
      const gallery = document.getElementById("gallery");
      gallery.addEventListener("error", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLImageElement)) return;
        const card = target.closest(".card");
        if (!card) return;
        card.remove();
        applyCardOverlap(gallery);
      }, true);

      window.addEventListener("resize", () => {
        applyCardOverlap(gallery);
        keepDateLabelsVisible(gallery);
      });
      setInterval(loadImages, RELOAD_INTERVAL_MS);
    }

    function syncBackgroundWithScroll() {
      const gallery = document.getElementById("gallery");
      gallery.addEventListener("scroll", () => {
        document.body.style.backgroundPosition = `${-gallery.scrollLeft}px top`;
      }, { passive: true });
    }

    function enableMouseDragScroll() {
      const gallery = document.getElementById("gallery");
      let isDragging = false;
      let startX = 0;
      let lastX = 0;
      let lastTime = 0;
      let velocity = 0;
      let inertiaId = 0;
      let moved = false;
      let suppressClick = false;

      function stopInertia() {
        if (!inertiaId) return;
        cancelAnimationFrame(inertiaId);
        inertiaId = 0;
      }

      function startInertia() {
        const friction = 0.95;
        const minVelocity = 0.02; // px/ms

        function step() {
          const maxScroll = Math.max(0, gallery.scrollWidth - gallery.clientWidth);
          gallery.scrollLeft += velocity * 16.67;

          if (gallery.scrollLeft <= 0 || gallery.scrollLeft >= maxScroll) {
            stopInertia();
            return;
          }

          velocity *= friction;
          if (Math.abs(velocity) < minVelocity) {
            stopInertia();
            return;
          }
          inertiaId = requestAnimationFrame(step);
        }

        if (Math.abs(velocity) < minVelocity) return;
        stopInertia();
        inertiaId = requestAnimationFrame(step);
      }

      gallery.addEventListener("mousedown", (event) => {
        if (event.button !== 0) return;
        stopInertia();
        isDragging = true;
        moved = false;
        startX = event.clientX;
        lastX = event.clientX;
        lastTime = performance.now();
        velocity = 0;
        gallery.classList.add("is-dragging");
        event.preventDefault();
      });

      window.addEventListener("mousemove", (event) => {
        if (!isDragging) return;
        const now = performance.now();
        const deltaX = event.clientX - lastX;
        const dt = Math.max(1, now - lastTime);
        const scrollDelta = -deltaX;

        if (Math.abs(event.clientX - startX) > 3) moved = true;

        gallery.scrollLeft += scrollDelta;
        const instantVelocity = scrollDelta / dt;
        velocity = (velocity * 0.8) + (instantVelocity * 0.2);

        lastX = event.clientX;
        lastTime = now;
        event.preventDefault();
      });

      window.addEventListener("mouseup", () => {
        if (!isDragging) return;
        isDragging = false;
        gallery.classList.remove("is-dragging");
        startInertia();
        if (moved) {
          suppressClick = true;
          setTimeout(() => { suppressClick = false; }, 0);
        }
      });

      window.addEventListener("mouseleave", () => {
        if (!isDragging) return;
        isDragging = false;
        gallery.classList.remove("is-dragging");
        startInertia();
      });

      gallery.addEventListener("dragstart", (event) => {
        event.preventDefault();
      });

      gallery.addEventListener("click", (event) => {
        if (!suppressClick) return;
        event.preventDefault();
        event.stopPropagation();
      });
    }

    syncBackgroundWithScroll();
    enableMouseDragScroll();
    setupAutoFillBehavior();
    loadImages();
  </script>
</body>
</html>
