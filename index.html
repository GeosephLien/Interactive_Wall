<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Gallery</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1c2733;
      --muted: #6b7785;
      --border: #d8dee4;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #eef2f6 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 34px);
    }

    .hint {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card img {
      display: block;
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #f0f3f7;
    }

    .name {
      padding: 10px 12px;
      font-size: 13px;
      color: #304050;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-top: 1px solid var(--border);
    }

    .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Images Gallery</h1>
    <p class="hint">Auto-load files from <code>images/</code> and render left-to-right.</p>
    <section id="gallery" class="gallery" aria-live="polite"></section>
    <p id="status" class="status">Loading...</p>
  </main>

  <script>
    const DEFAULT_OWNER = "GeosephLien";
    const DEFAULT_REPO = "Image_Source";
    const IMAGE_EXT = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg", ".avif"];

    function detectRepoFromLocation() {
      const host = window.location.hostname;
      const pathParts = window.location.pathname.split("/").filter(Boolean);

      if (host.endsWith(".github.io")) {
        return {
          owner: host.split(".")[0],
          repo: pathParts[0] || DEFAULT_REPO
        };
      }

      return { owner: DEFAULT_OWNER, repo: DEFAULT_REPO };
    }

    function isImageFile(name) {
      const lower = name.toLowerCase();
      return IMAGE_EXT.some(ext => lower.endsWith(ext));
    }

    function buildImageUrl(owner, repo, path) {
      return `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}`;
    }

    async function loadImages() {
      const { owner, repo } = detectRepoFromLocation();
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/images`;
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      try {
        const res = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const files = await res.json();

        const images = files
          .filter(item => item.type === "file" && isImageFile(item.name))
          .sort((a, b) => a.name.localeCompare(b.name));

        if (images.length === 0) {
          status.textContent = "No images found in images/.";
          return;
        }

        const cards = images.map(item => {
          const url = buildImageUrl(owner, repo, item.path);
          return `
            <article class="card">
              <a href="${url}" target="_blank" rel="noopener noreferrer">
                <img src="${url}" alt="${item.name}" loading="lazy" />
              </a>
              <div class="name" title="${item.name}">${item.name}</div>
            </article>
          `;
        });

        gallery.innerHTML = cards.join("");
        status.textContent = `Loaded ${images.length} images (${owner}/${repo})`;
      } catch (err) {
        status.textContent = `Load failed: ${err.message}`;
      }
    }

    loadImages();
  </script>
</body>
</html>
