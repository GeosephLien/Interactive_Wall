<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Gallery</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1c2733;
      --muted: #6b7785;
      --border: #d8dee4;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #eef2f6 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 100%;
      margin: 0;
      height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 34px);
    }

    .hint {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .gallery {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      align-items: stretch;
      overflow-x: auto;
      overflow-y: hidden;
      height: 100%;
      padding-bottom: 4px;
    }

    .card {
      position: relative;
      flex: 0 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      height: 100%;
    }

    .card a {
      display: block;
      height: 100%;
    }

    .card img {
      display: block;
      width: auto;
      height: 100%;
      object-fit: contain;
      background: #f0f3f7;
    }

    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Images Gallery</h1>
    <p class="hint">Auto-load files from <code>images/</code> and render left-to-right.</p>
    <section id="gallery" class="gallery" aria-live="polite"></section>
    <p id="status" class="status">Loading...</p>
  </main>

  <script>
    const IMAGE_EXT = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg", ".avif"];
    const LOCAL_MANIFEST = "images/images.json";

    function isImageFile(name) {
      const lower = name.toLowerCase();
      return IMAGE_EXT.some(ext => lower.endsWith(ext));
    }

    async function loadLocalManifest() {
      const res = await fetch(LOCAL_MANIFEST, { cache: "no-store" });
      if (!res.ok) throw new Error(`Manifest ${res.status}`);
      const raw = await res.text();
      const data = JSON.parse(raw.replace(/^\uFEFF/, ""));
      if (!Array.isArray(data)) throw new Error("Invalid manifest format");
      return data
        .filter(item => item && typeof item.path === "string" && isImageFile(item.path))
        .map(item => ({
          name: item.name || item.path.split("/").pop(),
          path: item.path,
          lastModified: item.lastModified || ""
        }));
    }

    function sortOldToNew(images) {
      return images.sort((a, b) => {
        const ta = a.lastModified ? Date.parse(a.lastModified) : Number.MAX_SAFE_INTEGER;
        const tb = b.lastModified ? Date.parse(b.lastModified) : Number.MAX_SAFE_INTEGER;
        if (ta !== tb) return ta - tb;
        return a.name.localeCompare(b.name);
      });
    }

    async function loadFromGitHubApi() {
      const owner = "GeosephLien";
      const repo = "Image_Source";
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/images`;
      const res = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const files = await res.json();
      return files
        .filter(item => item.type === "file" && isImageFile(item.name))
        .map(item => ({
          name: item.name,
          path: `images/${item.name}`,
          lastModified: ""
        }))
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    async function loadImages() {
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      try {
        let images;
        let source = "images/images.json";
        try {
          images = sortOldToNew(await loadLocalManifest());
        } catch {
          images = await loadFromGitHubApi();
          source = "GitHub API fallback";
        }

        if (images.length === 0) {
          status.textContent = "No images found in images/.";
          return;
        }

        const cards = images.map(item => {
          const url = item.path;
          return `
            <article class="card">
              <a href="${url}" target="_blank" rel="noopener noreferrer">
                <img src="${url}" alt="${item.name}" loading="lazy" />
              </a>
            </article>
          `;
        });

        gallery.innerHTML = cards.join("");
        status.textContent = `Loaded ${images.length} images (${source})`;
      } catch (err) {
        status.textContent = `Load failed: ${err.message}`;
      }
    }

    loadImages();
  </script>
</body>
</html>
